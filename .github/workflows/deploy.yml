name: Build & Deploy — WSD World Clock

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_deploy:
    name: Build Flutter Web & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Generate PNG icons from SVG favicon
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 32  -h 32  web/favicon.svg -o web/favicon.png
          rsvg-convert -w 192 -h 192 web/favicon.svg -o web/icons/Icon-192.png
          rsvg-convert -w 192 -h 192 web/favicon.svg -o web/icons/Icon-maskable-192.png
          rsvg-convert -w 512 -h 512 web/favicon.svg -o web/icons/Icon-512.png
          rsvg-convert -w 512 -h 512 web/favicon.svg -o web/icons/Icon-maskable-512.png

      - name: Build web (release)
        run: flutter build web --release

      # The next three steps only run on direct push to main (not PRs).

      - name: Install Firebase CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_TOKEN }}

      - name: Create hosting site if not exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: firebase hosting:sites:create wsdworldtime --project wsddigiclock 2>/dev/null || true

      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: firebase deploy --only hosting --project wsddigiclock
