name: Build & Deploy — WSD World Clock

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_deploy:
    name: Build Flutter Web & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      # WEATHER_API_KEY is injected at compile time via --dart-define.
      # Add it as a GitHub secret: Settings → Secrets → WEATHER_API_KEY
      # Get a key at: console.cloud.google.com → Enable "Weather API" (Maps Platform)
      # If the secret is empty, weather widgets are hidden automatically.
      - name: Build web (release)
        run: |
          flutter build web --release \
            --dart-define=WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}

      # Deploy only on direct push to main (not on pull-request builds)
      - name: Deploy to Firebase Hosting
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: wsddigiclock
          target: wsdworldtime
